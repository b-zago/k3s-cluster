apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-nyanify-server-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nyanify-server
                port:
                  number: 80
  tls:
    - hosts:
        - {{ .Values.host }}
      secretName: nyanify-server-tls
