apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ships-server-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: ships.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ships-server
                port:
                  number: 80
