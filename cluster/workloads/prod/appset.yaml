apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads-prod
  namespace: argocd
  labels:
    part-of: prod-app
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/b-zago/k3s-cluster
              revision: HEAD
              files:
                - path: cluster/workloads/prod/paths.yaml
          - list:
              elementsYaml: "{{ .key.prod | toJson }}"
  template:
    metadata:
      name: "{{.appName}}-prod"
      namespace: argocd
      labels:
        appset: workloads-prod
        part-of: prod-app
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/b-zago/k3s-cluster
        targetRevision: HEAD
        path: "{{.chartPath}}"
        helm:
          valueFiles:
            - values.yaml
            - values-prod.yml
      destination:
        server: https://kubernetes.default.svc
        namespace: prod
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
