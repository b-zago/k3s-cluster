apiVersion: v1
kind: ServiceAccount
metadata:
  name: rikami-service-account
  namespace: {{ .Values.env }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-cert-fetch
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sealed-secrets-cert-fetch
subjects:
  - kind: ServiceAccount
    name: rikami-service-account
    namespace: {{ .Values.env }}
