env: "staging"

routes:
  - name: web-server-route
    runsOn: web-server-service
    host: scorevault-stage.zagoapps.com

services:
  - name: web-server-service
    runsOn: web-server
    port: 80
    targetPort: 8000
  - name: redisService
    runsOn: redis
    port: 6379
    targetPort: 6379
  - name: database-service
    runsOn: database
    port: 5432
    targetPort: 5432

secrets:
  - name: database-envs
    runsOnList:
      - web-server
      - database
    data:
      POSTGRES_DB: 
      POSTGRES_PASSWORD: 
      POSTGRES_USER: 

deployments:
  - name: web-server
    image: ghcr.io/b-zago/scorevault/web-server:latest
    imagePullSecret: ghcr-creds
    runsOn: python
    component: server
    containerPort: 8000
    envSecretRefs:
      - database-envs
    envVars:
      - name: DB_HOST
        value: scorevault-database-service
      - name: REDIS
        value: scorevault-redisService
  - name: redis
    image: redis:8-alpine
    runsOn: redis
    component: cache
    containerPort: 6379
  - name: database
    image: postgres:18-alpine
    runsOn: postgres
    component: database
    containerPort: 5432
    envSecretRefs:
      - database-envs
