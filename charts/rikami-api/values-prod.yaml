env: prod
atlasSchema:
  - name: database-schema
    runsOn: database-database
    schemaCMKey: schema.sql
    schemaCMName: database-config
    secretKey: url
    secretName: database-credentials
configMap:
  - name: database-config
    runsOn: database-schema
    schemas:
      schema.sql: |
        CREATE TABLE roles (
            role_id     SERIAL PRIMARY KEY,
            role_name   VARCHAR(50) NOT NULL,
            sleep       BOOLEAN NOT NULL,
            awake       BOOLEAN NOT NULL,
            regen       BOOLEAN NOT NULL,
            update      BOOLEAN NOT NULL,
            kill        BOOLEAN NOT NULL,
            summon      BOOLEAN NOT NULL,
            users       BOOLEAN NOT NULL
        );
        
        CREATE TABLE users (
            user_id     SERIAL PRIMARY KEY,
            role_id     INT NOT NULL REFERENCES roles(role_id),
            user_name   VARCHAR(50) NOT NULL UNIQUE,
            pass        VARCHAR(255) NOT NULL,
            hmac_token  VARCHAR(64) NOT NULL
        );
        
        INSERT INTO roles (role_name, sleep, awake, regen, update, kill, summon, users)
        VALUES
            ('admin', TRUE, TRUE, TRUE, TRUE, TRUE, TRUE, TRUE),
            ('moderator', TRUE, TRUE, TRUE, TRUE, TRUE, TRUE, FALSE),
            ('maintainer',TRUE, TRUE, TRUE, TRUE, FALSE, FALSE, FALSE);
database:
  - cluster: database-cluster
    databaseReclaimPolicy: retain
    name: database-database
deployment:
  - component: cache
    containerPort: 6379
    image: redis:8-alpine
    name: redis
    runsOn: redis
  - component: server
    containerPort: 8080
    envSecretRefs:
      - rikami-api-web-server-envs
    image: ghcr.io/b-zago/rikami-api/webserver:latest
    imagePullSecrets: ghcr-creds
    name: web-server
    runsOn: golang
route:
  - host: rikami-api.zagoapps.com
    name: web-server-route
    runsOn: web-server-service
secret:
  - data:
      url: 
    name: database-credentials
    runsOn: database-schema
    runsOnList:
      - database-schema
  - data: 
      ADMIN_HMAC: 
      ADMIN_PASSWORD: 
      ADMIN_USER: 
      POSTGRES_DB: 
      POSTGRES_HOST: 
      POSTGRES_PASSWORD: 
      POSTGRES_USER: 
      REDIS_HOST: 
    name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
service:
  - name: redis-service
    port: 6379
    runsOn: redis
    targetPort: 6379
  - name: web-server-service
    port: 80
    runsOn: web-server
    targetPort: 8080
