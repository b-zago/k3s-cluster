{{- define "lib.route" -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-http
spec:
  parentRefs:
    - name: traefik
      kind: Gateway
  hostnames:
    - {{ .Values.host }}
  rules:
     - matches:
        - path:
            type: PathPrefix
            value: /
       backendRefs:
        - name: {{ .Values.name }}-server
          port: 80
{{- end -}}