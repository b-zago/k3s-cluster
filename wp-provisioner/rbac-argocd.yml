apiVersion: v1
kind: ServiceAccount
metadata:
  name: wp-provisioner
  namespace: wp-provisioner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-wp-manager
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wp-provisioner-argocd-binding
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: wp-provisioner
    namespace: wp-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-wp-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-manager
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wp-provisioner-namespace-manager
subjects:
  - kind: ServiceAccount
    name: wp-provisioner
    namespace: wp-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: namespace-manager
