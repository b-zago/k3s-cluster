env: staging
deployments:
  - component: server
    containerPort: 3000
    envSecretRefs:
      - web-server-envs
    envVars:
      - name: PORT
        value: "3000"
      - name: NODE_ENV
        value: production
      - name: DB_HOST
        value: links-organizer-database-service
      - name: DB_PORT
        value: "5432"
    image: ghcr.io/b-zago/links-organizer/webserver:latest
    imagePullSecret: ghcr-creds
    name: web-server
    runsOn: nodejs
routes:
  - host: organizer-staging.zagoapps.com
    name: web-server-route
    runsOn: web-server-service
secrets:
  - data:
      DB_NAME: 
      DB_PASSWORD: 
      DB_USER: 
      JWT_SECRET: 
    name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
  - data:
      POSTGRES_DB: 
      POSTGRES_PASSWORD: 
      POSTGRES_USER: 
    name: database-envs
    runsOnList:
      - database
services:
  - name: web-server-service
    port: 80
    runsOn: web-server
    targetPort: 3000
  - clusterIP: None
    name: database-service
    port: 5432
    runsOn: database
    targetPort: 5432
statefulsets:
  - component: database
    containerPort: 5432
    imagePullSecret: ghcr-creds
    envSecretRefs:
      - database-envs
    image: ghcr.io/b-zago/links-organizer/postgres:stable
    mountPath: /var/lib/postgresql
    name: database
    runsOn: postgres
    storage: 1Gi
