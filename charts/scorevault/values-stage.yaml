env: "staging"

routes:
  - name: webServerRoute
    runsOn: webServerService
    host: scorevault-stage.zagoapps.com

services:
  - name: webServerService
    runsOn: webServer
    port: 80
    targetPort: 8000
  - name: redisService
    runsOn: redis
    port: 6379
    targetPort: 6379
  - name: databaseService
    runsOn: database
    port: 5432
    targetPort: 5432

secrets:
  - name: databaseEnvs
    runsOnList:
      - webServer
      - database
    data:
      POSTGRES_DB: 
      POSTGRES_PASSWORD: 
      POSTGRES_USER: 

deployments:
  - name: webServer
    image: ghcr.io/b-zago/scorevault/webserver:latest
    imagePullSecret: ghcr-creds
    runsOn: python
    component: server
    containerPort: 8000
    envSecretRefs:
      - databaseEnvs
    envVars:
      - name: DB_HOST
        value: scorevault-databaseService
      - name: REDIS
        value: scorevault-redisService
  - name: redis
    image: redis:8-alpine
    runsOn: redis
    component: cache
    containerPort: 6379
  - name: database
    image: postgres:18-alpine
    runsOn: postgres
    component: database
    containerPort: 5432
    envSecretRefs:
      - databaseEnvs
