apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-server
spec:
  selector:
    app: {{ .Values.name }}-server
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}-server
  template:
    metadata:
      labels:
        app: {{ .Values.name }}-server
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: {{ .Values.name }}-server
          image: {{ .Values.images.server }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: {{ .Values.name }}-secrets
          env:
            - name: REDIS
              value: {{ .Values.name }}-redis
            - name: DB_HOST
              value: {{ .Values.name }}-db
