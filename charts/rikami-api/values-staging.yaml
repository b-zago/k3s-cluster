env: staging
deployments:
  - component: server
    containerPort: 8080
    envSecretRefs:
      - web-server-envs
    image: ghcr.io/b-zago/rikami-api/webserver:8ba5b2c
    imagePullSecret: ghcr-creds
    name: web-server
    runsOn: go
    serviceAccountName: rikami-service-account
routes:
  - host: rikami-staging.zagoapps.com
    name: web-server-route
    runsOn: web-server-service
secrets:
  - data:
      GITHUB_TOKEN: 
      TOKEN_957543eb60efffbfc85fb2c04a6e3007: 
      USER_957543eb60efffbfc85fb2c04a6e3007: 
    name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
services:
  - name: web-server-service
    port: 80
    runsOn: web-server
    targetPort: 8080
