env: "staging"

routes:
  - name: webServerRoute
    runsOn: webServerService
    host: nyanify-staging.zagoapps.com

services:
  - name: webServerService
    runsOn: webServer
    port: 80
    targetPort: 8000

secrets:
  - name: webServerEnvs
    runsOn: webServer
    runsOnList:
      - webServer
    data:
      HMAC_KEY: 
      TOKEN: 

deployments:
  - name: webServer
    image: ghcr.io/b-zago/nyanify/server:latest
    imagePullSecret: ghcr-creds
    runsOn: python
    component: server
    containerPort: 8000
    envSecretRefs:
      - webServerEnvs
