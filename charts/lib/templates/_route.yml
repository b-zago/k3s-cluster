{{- define "lib.route" -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-httproute
  namespace: {{ .Values.namespace }}
  labels:
    runs-on: {{ .Values.namespace }}-gateway
    instance: {{ .Values.name }}-httproute
    component: httproute
    part-of: {{ .Values.name }}
spec:
  parentRefs:
    - name: {{ .Values.namespace }}-gateway
      kind: Gateway
  hostnames:
    - {{ .Values.host }}
  rules:
     - matches:
        - path:
            type: PathPrefix
            value: /
       backendRefs:
        - name: {{ .Values.name }}-{{ .Values.env }}-service-external
          port: 80
{{- end -}}