env: prod
deployments:
  - component: server
    containerPort: 8080
    envSecretRefs:
      - web-server-envs
    image: ghcr.io/b-zago/rikami-api/webserver:197557d
    imagePullSecret: ghcr-creds
    name: web-server
    runsOn: go
    serviceAccountName: rikami-service-account
routes:
  - host: rikami.zagoapps.com
    name: web-server-route
    runsOn: web-server-service
secrets:
  - data:
      GITHUB_TOKEN: 
      TOKEN_1f1b082099b90969: 
      USER_1f1b082099b90969: 
    name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
services:
  - name: web-server-service
    port: 80
    runsOn: web-server
    targetPort: 8080
