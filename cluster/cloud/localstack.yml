apiVersion: v1
kind: Service
metadata:
  name: localstack
spec:
  type: ClusterIP
  selector:
    app: localstack
  ports:
    - port: 4566
      targetPort: 4566
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack-pro:latest
          ports:
            - containerPort: 4566
          env:
            - name: LOCALSTACK_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: localstack-auth
                  key: token
            - name: PERSISTENCE
              value: "1"
            - name: DOCKER_HOST
              value: tcp://localhost:2375
            - name: LAMBDA_DOCKER_NETWORK
              value: bridge
            - name: LOCALSTACK_HOST
              value: "172.17.0.1:4566"
          volumeMounts:
            - name: data
              mountPath: /var/lib/localstack
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: localstack
        - name: dind-storage
          emptyDir: {}
