env: prod

deployments:
  - component: server
    containerPort: 3000
    envSecretRefs:
      - web-server-envs
    image: ghcr.io/b-zago/links-organizer/webserver:latest
    imagePullSecret: ghcr-creds
    name: web-server
    runsOn: nodejs
routes:
  - host: organizer-staging.zagoapps.com
    name: web-server-route
    runsOn: web-server-service
secrets:
  - data:
      DB_NAME: 
      DB_PASSWORD: 
      DB_USER: 
      JWT_SECRET: 
    name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
  - data:
      POSTGRES_DB: 
      POSTGRES_PASSWORD: 
      POSTGRES_USER: 
    name: database-envs
    runsOnList:
      - database
services:
  - name: web-server-service
    port: 80
    runsOn: web-server
    targetPort: 3000
statefulsets:
  - component: database
    containerPort: 5432
    envSecretRefs:
      - database-envs
    image: ghcr.io/b-zago/links-organizer/postgres:latest
    mountPath: /var/lib/postgresql
    name: database
    runsOn: postgres
    storage: 1Gi
