apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-db-service
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-db
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-db-deployment
  labels:
    app: {{ .Release.Name }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-db
  template:
    metadata:
      name: {{ .Release.Name }}-db
      labels:
        app: {{ .Release.Name }}-db
    spec:
      volumes:
        - name: {{ .Release.Name }}-db-pv-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-db-pv-claim
      containers:
        - name: {{ .Release.Name }}-db
          image: mysql
          env:
            - name: MYSQL_DATABASE
              value: wordpress
            - name: MYSQL_USER
              value: {{ .Values.dbUser }}
            - name: MYSQL_PASSWORD
              value: {{ .Values.dbPassword }}
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.dbRootPassword }}
          ports:
            - containerPort: 3306
          volumeMounts:
            - mountPath: "/var/lib/mysql"
              name: {{ .Release.Name }}-db-pv-storage