apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-server
spec:
  selector:
    app: {{ .Values.name }}-server
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}-server
  template:
    metadata:
      labels:
        app: {{ .Values.name }}-server
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      serviceAccountName: wp-provisioner
      containers:
        - name: {{ .Values.name }}-server
          image: {{ .Values.images.server }}
          imagePullPolicy: Always
          env:
            - name: MAX_WORDPRESS_INSTANCES
              value: "2"
            - name: PROD_DEPLOY
              value: {{ if eq .Values.env "prod" }}"1"{{ else }}"0"{{ end }}
            - name: WP_PROV_DEV
              value: "0"
          ports:
            - containerPort: 8000
