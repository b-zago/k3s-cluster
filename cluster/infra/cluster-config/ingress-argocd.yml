apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.zagoapps.com`)
      priority: 10
      services:
        - name: argocd-server
          port: 80
          namespace: argocd
    - kind: Rule
      match: Host(`argocd.zagoapps.com`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
          namespace: argocd
  tls:
    secretName: argocd-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-cert
  namespace: argocd
spec:
  secretName: argocd-tls
  dnsNames:
    - argocd.zagoapps.com
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer