env: "staging"

routes:
  - name: web-server-route
    runsOn: web-server-service
    host: nyanify-staging.zagoapps.com

services:
  - name: web-server-service
    runsOn: web-server
    port: 80
    targetPort: 8000

secrets:
  - name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
    data:
      HMAC_KEY: 
      TOKEN: 

deployments:
  - name: web-server
    image: ghcr.io/b-zago/nyanify/server:latest
    imagePullSecret: ghcr-creds
    runsOn: python
    component: server
    containerPort: 8000
    envSecretRefs:
      - web-server-envs
