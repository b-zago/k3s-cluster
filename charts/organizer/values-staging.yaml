env: "staging"

routes:
  - name: web-server-route
    runsOn: web-server-service
    host: organizer-staging.zagoapps.com

services:
  - name: web-server-service
    runsOn: web-server
    port: 80
    targetPort: 3000
  - name: database-service
    runsOn: database
    port: 5432
    targetPort: 5432

secrets:
  - name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
    data:
      DB_NAME: 
      DB_PASSWORD: 
      DB_USER: 
      JWT_SECRET: 
  - name: database-envs
    runsOnList:
      - database
    runsOn: database
    data:
      POSTGRES_DB: 
      POSTGRES_PASSWORD: 
      POSTGRES_USER: 

deployments:
  - name: web-server
    image: ghcr.io/b-zago/links-organizer/server:latest
    imagePullSecret: ghcr-creds
    runsOn: nodejs
    component: server
    containerPort: 3000
    envSecretRefs:
      - web-server-envs
    envVars:
      - name: PORT
        value: "3000"
      - name: NODE_ENV
        value: production
      - name: DB_HOST
        value: "organizer-database-service"
      - name: DB_PORT
        value: "5432"

statefulSets:
  - name: database
    runsOn: postgres
    image: ghcr.io/b-zago/links-organizer/postgres:latest
    containerPort: 5432
    imagePullSecret: ghcr-creds
    component: database
    mounPath: /var/lib/postgresql
    storage: 1Gi
    envSecretRefs:
      - database-envs
