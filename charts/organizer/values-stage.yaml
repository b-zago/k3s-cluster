env: "staging"

routes:
  - name: webServerRoute
    runsOn: webServerService
    host: organizer-staging.zagoapps.com

services:
  - name: webServerService
    runsOn: webServer
    port: 80
    targetPort: 3000
  - name: databaseService
    runsOn: database
    port: 5432
    targetPort: 5432

secrets:
  - name: webServerEnvs
    runsOn: webServer
    runsOnList:
      - webServer
    data:
      DB_NAME: 
      DB_PASSWORD: 
      DB_USER: 
      JWT_SECRET: 
  - name: databaseEnvs
    runsOnList:
      - database
    runsOn: database
    data:
      POSTGRES_DB: 
      POSTGRES_PASSWORD: 
      POSTGRES_USER: 

deployments:
  - name: webServer
    image: ghcr.io/b-zago/links-organizer/server:latest
    imagePullSecret: ghcr-creds
    runsOn: nodejs
    component: server
    containerPort: 3000
    envSecretRefs:
      - webServerEnvs
    envVars:
      - name: PORT
        value: "3000"
      - name: NODE_ENV
        value: production
      - name: DB_HOST
        value: "organizer-databaseService"
      - name: DB_PORT
        value: "5432"

statefulSets:
  - name: database
    runsOn: postgres
    image: ghcr.io/b-zago/links-organizer/postgres:latest
    containerPort: 5432
    imagePullSecret: ghcr-creds
    component: database
    mounPath: /var/lib/postgresql
    storage: 1Gi
    envSecretRefs:
      - databaseEnvs
