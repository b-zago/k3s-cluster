env: prod
deployments:
  - component: server
    containerPort: 80
    image: ghcr.io/b-zago/portfolio/webserver:f1ed66e
    imagePullSecret: ghcr-creds
    name: web-server
    runsOn: nginx
routes:
  - host: zagoapps.com
    name: web-server-route
    runsOn: web-server-service
services:
  - name: web-server-service
    port: 80
    runsOn: web-server
    targetPort: 80
