apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-service
  namespace: {{ .Values.namespace }}
  labels:
    runs-on: {{ .Values.name }}-httproute
    instance: {{ .Values.name }}-service
    component: service
    part-of: {{ .Values.name }}
spec:
  selector:
    app: nyanify-server
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyanify-server
  labels:
    runs-on: {{ .Values.name }}-httproute
    instance: {{ .Values.name }}-webserver
    component: server
    part-of: {{ .Values.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nyanify-server
  template:
    metadata:
      labels:
        app: nyanify-server
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: nyanify-server
          image: {{ .Values.images.server }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: nyanify-secrets
