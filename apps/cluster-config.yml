apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://github.com/b-zago/k3d-infra
    targetRevision: HEAD
    path: apps/cluster-config/
  destination:
    server: https://kubernetes.default.svc
    namespace: cluster-config
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
