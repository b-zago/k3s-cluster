env: prod
deployment:
  - component: server
    containerPort: 8000
    env: 
      - name: ENV1
        value: envir_value_1
      - name: ENV2
        value: "2"
    envSecretRefs:
      - web-server-envs
    image: ghcr.io/b-zago/simple-test-api/webserver:1.0.7
    imagePullSecrets: ghcr-creds
    name: web-server
    runsOn: python
route:
  - host: simple-test-api.zagoapps.com
    name: web-server-route
    runsOn: web-server-service
secret:
  - data: 
      SECRET1: 
      SECRET2: 
    name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
service:
  - name: web-server-service
    port: 80
    runsOn: web-server
    targetPort: 8000
